<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saw Thu Naing | Senior Full-Stack .NET Developer</title>
    <meta name="description" content="Senior Software Engineer with 10+ years of experience in FinTech, streaming, and microservices. Expert in .NET Core, AWS, and cloud architecture." />
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.15.1/devicon.min.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="SawThuNaingPortfolio.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <div class="loading-screen">
            <div class="loader-container">
                <div class="loader-text">&lt;SawThuNaing /&gt;</div>
                <div class="loader-bar"><div class="loader-fill"></div></div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.initScrollAnimations = function() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('visible');
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.animate-on-scroll').forEach(el => observer.observe(el));
        };
        window.initTypingEffect = function(elementId, texts, speed) {
            let textIndex = 0, charIndex = 0, isDeleting = false;
            const el = document.getElementById(elementId);
            if (!el) return;
            function type() {
                const currentText = texts[textIndex];
                if (isDeleting) { el.textContent = currentText.substring(0, charIndex - 1); charIndex--; }
                else { el.textContent = currentText.substring(0, charIndex + 1); charIndex++; }
                if (!isDeleting && charIndex === currentText.length) setTimeout(() => { isDeleting = true; }, 2000);
                else if (isDeleting && charIndex === 0) { isDeleting = false; textIndex = (textIndex + 1) % texts.length; }
                setTimeout(type, isDeleting ? speed / 2 : speed);
            }
            type();
        };
        window.scrollToSection = function(id) {
            const el = document.getElementById(id);
            if (el) el.scrollIntoView({ behavior: 'smooth' });
        };
        window.copyToClipboard = function(text) {
            navigator.clipboard.writeText(text).then(() => alert('Email copied!'));
        };
    </script>
</body>

</html>
