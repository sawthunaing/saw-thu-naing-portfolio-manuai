name: Build Blazor WASM and Deploy to Vercel

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish
        run: dotnet publish -c Release -o publish

      # For Blazor WASM, static files are inside publish/wwwroot
      - name: Copy Vercel config into output
        run: cp vercel.json publish/wwwroot/vercel.json

      - name: Deploy to Vercel
        run: npx vercel@latest deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }} publish/wwwroot
